services:

  postgres:
    image: postgres:18.4
    container_name: data_processing_postgre
    restart: always
    environment:
      POSTGRES_USER: web_project_user
      POSTGRES_PASSWORD: web_project_password
      POSTGRES_DB: web_project_db
    ports:
      - "5432:5432"
    volumes:
      - data_processing_postgre:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:9.16
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"

  redis:
    image: redis:8.8
    container_name: data_processing_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - data_processing_redis:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:3.6.0
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  data_processing_postgre:
  data_processing_redis: